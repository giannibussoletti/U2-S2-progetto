<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./assets/style.css" />
    <link rel="stylesheet" href="./assets/override.css" />
    <script src="https://kit.fontawesome.com/4cddab353b.js" crossorigin="anonymous"></script>
    <title>Document</title>
  </head>
  <body class="bg-black text-white">
    <header class="bg-black mb-3">
      <nav class="d-flex">
        <div class="container">
          <div class="row d-flex">
            <div
              class="col p-0 d-flex justify-content-start align-items-center"
              style="height: 55px">
              <img class="h-100 me-5" src="./assets/img/netflix_logo.png" alt="" srcset="" />
              <ul class="d-flex list-inline gap-3 align-content-center justify-content-center mb-0">
                <li>Home</li>
                <li>TV Shows</li>
                <li>Movies</li>
                <li>Recently Added</li>
                <li>My List</li>
              </ul>
            </div>
            <div class="col d-flex justify-content-end p-0">
              <ul
                class="mb-0 d-flex list-inline gap-3 align-content-center justify-content-start align-items-center">
                <li>
                  <i class="fa-solid fa-magnifying-glass" style="color: rgb(255, 255, 255)"></i>
                </li>
                <li>KIDS</li>
                <li><i class="fa-solid fa-bell" style="color: rgb(255, 255, 255)"></i></li>
                <li style="height: 55px">
                  <img class="h-100 p-2" src="./assets/img/p-icon/avatar.png" alt="" />
                  <i class="fa-solid fa-sort-down" style="color: rgb(255, 255, 255)"></i>
                </li>
              </ul>
            </div>
          </div>
        </div>
      </nav>
    </header>
    <main>
      <div class="container">
        <div class="row mb-5">
          <div class="col d-flex gap-4 align-content-center">
            <h1>TV Shows</h1>
            <div class="dropdown d-flex align-items-center">
              <button
                class="btn btn-secondary dropdown-toggle"
                type="button"
                data-bs-toggle="dropdown"
                aria-expanded="false">
                Dropdown button
              </button>
              <ul class="dropdown-menu">
                <li><a class="dropdown-item" href="#">Action</a></li>
                <li><a class="dropdown-item" href="#">Another action</a></li>
                <li><a class="dropdown-item" href="#">Something else here</a></li>
              </ul>
            </div>
          </div>
          <div class="col text-end">Menu</div>
        </div>
        <div class="row">
          <div class="col-12 p-0 mb-2">
            <h4 class="fw-semibold text-light text-opacity-75">Trending Now</h4>
          </div>
          <div class="col">
            <div id="carouselExampleControls" class="carousel slide">
              <div class="carousel-inner">
                <div class="carousel-item active">
                  <div class="slide-container d-flex">
                    <img src="./assets/img/thumbnails/media2.jpg" class="w-25" alt="..." />
                    <img src="./assets/img/thumbnails/media2.jpg" class="w-25" alt="..." />
                    <img src="./assets/img/thumbnails/media2.jpg" class="w-25" alt="..." />
                    <img src="./assets/img/thumbnails/media2.jpg" class="w-25" alt="..." />
                  </div>
                </div>
                <div class="carousel-item">
                  <div class="slide-container d-flex">
                    <img src="./assets/img/thumbnails/media5.jpg" class="w-25" alt="..." />
                    <img src="./assets/img/thumbnails/media5.jpg" class="w-25" alt="..." />
                    <img src="./assets/img/thumbnails/media5.jpg" class="w-25" alt="..." />
                    <img src="./assets/img/thumbnails/media5.jpg" class="w-25" alt="..." />
                  </div>
                </div>
              </div>
              <button
                style="width: 5%"
                class="carousel-control-prev"
                type="button"
                data-bs-target="#carouselExampleControls"
                data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Previous</span>
              </button>
              <button
                style="width: 5%"
                class="carousel-control-next"
                type="button"
                data-bs-target="#carouselExampleControls"
                data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Next</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>
    <footer></footer>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"></script>
  </body>
</html>
