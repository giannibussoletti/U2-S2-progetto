<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./assets/style.css" />
    <link rel="stylesheet" href="./assets/override.css" />
    <script src="https://kit.fontawesome.com/4cddab353b.js" crossorigin="anonymous"></script>
    <title>Netflix</title>
  </head>
  <body class="bg-black text-white">
    <header class="bg-black mb-3">
      <!-- INIZIO NAVBAR -->
      <nav class="d-flex px-5">
        <div class="container-fluid">
          <div class="row d-flex">
            <!-- LOGO + MENU SINISTRA -->
            <div
              class="col p-0 d-flex justify-content-start align-items-center"
              style="height: 55px">
              <img class="h-100 me-5" src="./assets/img/netflix_logo.png" alt="" srcset="" />
              <ul class="d-flex list-inline gap-3 align-content-center justify-content-center mb-0">
                <li>Home</li>
                <li>TV Shows</li>
                <li>Movies</li>
                <li>Recently Added</li>
                <li>My List</li>
              </ul>
            </div>
            <!-- BELL GLASSE PROFILE -->
            <div class="col d-flex justify-content-end p-0">
              <ul
                class="mb-0 d-flex list-inline gap-3 align-content-center justify-content-start align-items-center">
                <li>
                  <i class="fa-solid fa-magnifying-glass" style="color: rgb(255, 255, 255)"></i>
                </li>
                <li>KIDS</li>
                <li><i class="fa-solid fa-bell" style="color: rgb(255, 255, 255)"></i></li>
                <li style="height: 55px">
                  <img class="h-100 p-2" src="./assets/img/p-icon/avatar.png" alt="" />
                  <i class="fa-solid fa-sort-down" style="color: rgb(255, 255, 255)"></i>
                </li>
              </ul>
            </div>
          </div>
        </div>
      </nav>
      <!-- FINE NAVBAR -->
    </header>
    <main>
      <!-- TV SHOW & DROPDOWN BUTTON GENRE -->
      <!-- TV SHOW TITLE -->
      <div class="container-fluid px-5">
        <div class="row mb-5">
          <div class="col d-flex gap-4 align-content-center">
            <h1>TV Shows</h1>
            <!-- DROPDOWN MENU NEAR TITLE -->
            <div class="dropdown d-flex align-items-center">
              <button
                class="btn btn-dark border border-2 border-light dropdown-toggle border rounded-0"
                type="button"
                data-bs-toggle="dropdown"
                aria-expanded="false">
                Genres
              </button>
              <ul class="dropdown-menu bg-black border border-2 border-light rounded-0">
                <li><a class="dropdown-item text-light link-dark" href="#">Action</a></li>
                <li><a class="dropdown-item text-light link-dark" href="#">Horror</a></li>
                <li><a class="dropdown-item text-light link-dark" href="#">Romantic</a></li>
                <li><a class="dropdown-item text-light link-dark" href="#">Animation</a></li>
              </ul>
            </div>
          </div>
          <!-- ICONE MENU SULLA DESTRA -->
          <div class="col text-end">Menu</div>
        </div>
      </div>
      <!-- FINE TV SHOW -->

      <!-- TRENDING NOW SECTION -->
      <div class="container-fluid px-5 my-5">
        <div class="row position-relative my-5">
          <!-- TITOLO -->
          <div class="col-12 p-0 mb-2">
            <h4 class="fw-semibold text-light text-opacity-75">Trending Now</h4>
          </div>
          <!-- INIZIO CAROSELLO TRENDING -->

          <div
            id="trending-carousel"
            class="smooth-carousel m-0 row row-cols-1 row-cols-sm-1 row-cols-md-2 row-cols-lg-3 row-cols-xl-3 row-cols-xxl-5 flex-nowrap overflow-auto hiding-bar w-100"></div>
          <!-- BUTTONS -->
          <span
            onclick="rightMovement(0)"
            style="width: 5%"
            class="end-0 p-0 position-absolute top-0 text-end h-100 d-flex justify-content-center align-items-center arrow-right"
            ><i
              class="fa-solid fa-angle-right fa-2x mt-5"
              style="color: rgb(255, 255, 255); width: 100px; height: 50px; line-height: 1.5em"></i>
          </span>
          <span
            onclick="leftMovement(0)"
            style="width: 5%"
            class="start-0 p-0 position-absolute top-0 text-end h-100 d-flex justify-content-center align-items-center arrow-left">
            <i
              class="fa-solid fa-angle-left fa-2x mt-5"
              style="color: rgb(255, 255, 255); width: 100px; height: 50px; line-height: 1.5em"></i>
          </span>
        </div>
        <!-- FINE CAROSELLO TRENDING -->
        <!-- WATCH IT AGAIN SECTION -->

        <!--  -->
        <div class="row position-relative my-5">
          <!-- TITOLO -->
          <div class="col-12 p-0 mb-2">
            <h4 class="fw-semibold text-light text-opacity-75">Trending Now</h4>
          </div>
          <!-- INIZIO CAROSELLO WATCH IT -->

          <div
            id="watch-again-carousel"
            class="smooth-carousel m-0 row row-cols-1 row-cols-sm-1 row-cols-md-2 row-cols-lg-3 row-cols-xl-3 row-cols-xxl-5 flex-nowrap overflow-auto hiding-bar w-100"></div>
          <!-- BUTTONS -->
          <span
            onclick="rightMovement(1)"
            style="width: 5%"
            class="end-0 p-0 position-absolute top-0 text-end h-100 d-flex justify-content-center align-items-center arrow-right"
            ><i
              class="fa-solid fa-angle-right fa-2x mt-5"
              style="color: rgb(255, 255, 255); width: 100px; height: 50px; line-height: 1.5em"></i>
          </span>
          <span
            onclick="leftMovement(1)"
            style="width: 5%"
            class="start-0 p-0 position-absolute top-0 text-end h-100 d-flex justify-content-center align-items-center arrow-left">
            <i
              class="fa-solid fa-angle-left fa-2x mt-5"
              style="color: rgb(255, 255, 255); width: 100px; height: 50px; line-height: 1.5em"></i>
          </span>
        </div>

        <!--  -->
      </div>
    </main>
    <footer>
      <div class="container">
        <div class="row">
          <div class="col-12">a</div>
          <div class="col">Ciao</div>
          <div class="col">Ciao</div>
          <div class="col">Ciao</div>
          <div class="col">Ciao</div>
        </div>
      </div>
    </footer>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"></script>
    <script src="./assets/js/script.js"></script>
  </body>
</html>
