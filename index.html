<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./assets/style.css" />
    <link rel="stylesheet" href="./assets/override.css" />
    <script src="https://kit.fontawesome.com/4cddab353b.js" crossorigin="anonymous"></script>
    <title>Netflix</title>
  </head>
  <body class="bg-black text-white profile-body">
    <div class="content-wrapper vh-100 px-3 d-flex flex-column">
      <header>
        <div class="container-fluid">
          <div class="row">
            <div style="height: 55px" class="col">
              <img class="h-100" src="./assets/img/netflix_logo.png" alt="" />
            </div>
          </div>
        </div>
      </header>
      <main>
        <div class="container">
          <div class="row">
            <div class="col border-bottom border-secondary">
              <h1 style="font-size: 4em">Edit Profile</h1>
            </div>
          </div>
          <div class="row">
            <div class="text-center text-md-start col-12 col-md-3 pt-4">
              <img class="img-fluid" src="./assets/img/p-icon/kids_icon.png" alt="" />
            </div>
            <div class="col">
              <!-- NOME E LINGUA -->
              <div class="border-bottom border-secondary py-4">
                <button class="border-0 bg-secondary bg-opacity-75 w-100 text-start mb-4">
                  <h5 class="text-light m-0 p-2">
                    <a class="link-light" href="./home.html">Strive Student</a>
                  </h5>
                </button>
                <h5 class="text-white opacity-75">Language:</h5>

                <div class="dropdown d-flex align-items-center">
                  <button
                    class="btn btn-dark border border-2 border-light dropdown-toggle border rounded-0"
                    type="button"
                    data-bs-toggle="dropdown"
                    aria-expanded="false">
                    Language
                  </button>
                  <ul class="dropdown-menu bg-black border border-2 border-light rounded-0">
                    <li><a class="dropdown-item text-light link-dark" href="#">Italian</a></li>
                    <li><a class="dropdown-item text-light link-dark" href="#">English</a></li>
                    <li><a class="dropdown-item text-light link-dark" href="#">German</a></li>
                    <li><a class="dropdown-item text-light link-dark" href="#">Spanish</a></li>
                  </ul>
                </div>
              </div>
              <!-- MATURITY SETTING -->
              <div class="border-bottom border-secondary py-4">
                <h5 class="text-white opacity-75">Maturity Settings:</h5>
                <button
                  class="btn btn-outline-secondary rounded-0 border-2 border-secondary px-4 active my-3">
                  ALL MATURITY RATINGS
                </button>
                <p>Show titles of all maturity ratings for this profile.</p>
                <button
                  type="button"
                  class="btn btn-outline-secondary rounded-0 border border-2 border-secondary px-4 my-1">
                  <a href="settings.html" class="text-white">EDIT</a>
                </button>
              </div>
              <!-- AUTOPLAY CONTROLS -->
              <div id="checkbox-css" class="py-4">
                <h5 class="text-white opacity-75">Autoplay Controls</h5>
                <div class="form-check row ms-1">
                  <input
                    class="form-check-input rounded-0 col-2"
                    type="checkbox"
                    value=""
                    id="checkDefault" />
                  <label class="col-10 form-check-label" for="checkDefault">
                    Autoplay next episode In a serles on all devices.
                  </label>
                </div>
                <div class="form-check row ms-1">
                  <input
                    class="form-check-input rounded-0 col-2"
                    type="checkbox"
                    value=""
                    id="checkChecked" />
                  <label class="col-10 form-check-label" for="checkChecked">
                    Autoplay previews whlle browsing on all devices.
                  </label>
                </div>
              </div>
            </div>
          </div>
          <!-- BUTTONS -->
          <div class="row mt-3 pt-4 border-top border-secondary">
            <div class="row d-flex flex-wrap justify-content-center gap-3">
              <button
                type="button"
                class="col-12 col-md-3 btn btn-outline-secondary rounded-0 border-2 border-secondary px-4 active">
                SAVE
              </button>
              <button
                type="button"
                class="col-12 col-md-3 btn btn-outline-secondary rounded-0 border border-2 border-secondary px-4">
                CANCEL
              </button>
              <button
                type="button"
                class="col-12 col-md-3 btn btn-outline-secondary rounded-0 border border-2 border-secondary px-4">
                DELETE PROFILE
              </button>
            </div>
          </div>
        </div>
      </main>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"></script>
    <script src="./assets/js/script.js"></script>
  </body>
</html>
